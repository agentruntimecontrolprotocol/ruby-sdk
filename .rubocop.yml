plugins:
  - rubocop-rspec
  - rubocop-performance
  - rubocop-rake

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'samples/**/*'
    - 'recipes/**/*'
    - 'tmp/**/*'
    - 'pkg/**/*'
    - 'vendor/**/*'
    - 'sig/**/*'
    - 'Gemfile.lock'

Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: single_quotes

# YARD docstrings exist where they add protocol value; blanket top-level
# class/module comments are not required for this gem.
Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

# Protocol/runtime objects are intentionally larger than Sandi Metz-style
# service classes; these limits flag outliers without forcing extra indirection.
Metrics/MethodLength:
  Max: 40

Metrics/ClassLength:
  Max: 400

Metrics/ModuleLength:
  Max: 400

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'arcp.gemspec'
    - 'Rakefile'

Metrics/AbcSize:
  Max: 50

# Constants defined inside Data.define do ... end blocks are a deliberate
# idiom for value-object-local constants (e.g. HEX32 regex on Envelope,
# ENCODINGS on ResultChunk).
Lint/ConstantDefinitionInBlock:
  Enabled: false

# `reason:` is part of the Transport#close interface contract even when
# concrete subclasses don't use it.
Lint/UnusedMethodArgument:
  AllowUnusedKeywordArguments: true

Metrics/CyclomaticComplexity:
  Max: 22

Metrics/PerceivedComplexity:
  Max: 22

Metrics/ParameterLists:
  Max: 8
  CountKeywordArgs: false

# Short names are allowed for narrow protocol ids and tiny block locals.
Naming/MethodParameterName:
  AllowedNames:
    - a
    - b
    - h
    - id
    - kw
    - s
    - t

# Integration specs are organized by protocol scenario first, not by a single
# nested umbrella describe.
RSpec/MultipleDescribes:
  Enabled: false

# Keep implementation files readable without forcing awkward envelope wrapping.
Layout/LineLength:
  Max: 110
  Exclude:
    - 'spec/**/*'

RSpec/ExampleLength:
  Max: 60

# Some manager command methods return booleans to signal whether a state change
# happened; forcing `?` names there would misrepresent them as pure predicates.
Naming/PredicateMethod:
  Enabled: false

RSpec/MultipleExpectations:
  Max: 8

RSpec/NestedGroups:
  Max: 5

RSpec/MultipleMemoizedHelpers:
  Max: 10

RSpec/DescribeClass:
  Exclude:
    - 'spec/integration/**/*'
    - 'spec/e2e/**/*'
    - 'spec/unit/coverage_spec.rb'
    - 'spec/unit/coverage_extras_spec.rb'

# Specs are grouped by test layer (`unit`, `integration`, `e2e`) instead of
# mirroring the source tree exactly.
RSpec/SpecFilePathFormat:
  Enabled: false

# Allow modules to be split across files
Style/ClassAndModuleChildren:
  EnforcedStyle: nested

# CI publishing does not use MFA; rubygems_mfa_required is intentionally omitted.
Gemspec/RequireMFA:
  Enabled: false
